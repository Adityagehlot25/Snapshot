services:
  - type: web
    name: ai-photo-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        generateValue: true
      - key: PORT
        value: 8000
